name: Send PDF to Donor

on:
  repository_dispatch:
    types: [send-pdf]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install requests

      - name: Send PDF to Donor and Alert Owner
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DONOR_EMAIL: ${{ github.event.client_payload.email }}
          DONATION_AMOUNT: ${{ github.event.client_payload.amount }}
          DONATION_TYPE: ${{ github.event.client_payload.type }}
        run: |
          python3 << 'PYEOF'
          import os, json, base64, requests
          from datetime import datetime, timezone, timedelta

          email = os.environ.get("DONOR_EMAIL", "")
          amount = os.environ.get("DONATION_AMOUNT", "0")
          dtype = os.environ.get("DONATION_TYPE", "card")
          api_key = os.environ.get("RESEND_API_KEY", "")

          print(f"Processing: {email}, ${amount}, type={dtype}")

          # Validate email
          if not email or "@" not in email:
              print(f"Invalid email: {email}")
              exit(1)

          # Validate minimum
          try:
              amt = float(amount)
          except:
              amt = 0
          if amt < 25:
              print(f"Amount ${amt} below $25 minimum. Skipping.")
              exit(0)

          # Determine if sneak peek PDF was sent
          sneak_peek_sent = amt >= 25

          # Read and encode PDF
          with open("The-CIA-Asset-Print.pdf", "rb") as f:
              pdf_b64 = base64.b64encode(f.read()).decode()

          # Build HTML email for donor
          html = f"""<div style="font-family:Georgia,serif;max-width:600px;margin:0 auto;background:#0a0a0a;color:#e0e0e0;padding:40px 30px;border:1px solid #333;">
          <div style="text-align:center;margin-bottom:30px;">
          <h1 style="color:#C9A84C;font-size:24px;margin-bottom:5px;">The CIA Asset</h1>
          <h2 style="color:#C0C0C0;font-size:18px;font-weight:normal;margin-top:0;">& The Man Who Didn&#39;t Take The Bait</h2>
          </div>
          <p style="font-size:16px;line-height:1.8;color:#e0e0e0;">Thank you for your generous donation of <strong style="color:#C9A84C;">${amt:.0f}</strong>.</p>
          <p style="font-size:16px;line-height:1.8;color:#e0e0e0;">As promised, attached is your exclusive <strong>sneak peek of the first few chapters</strong> of <em style="color:#C9A84C;">The CIA Asset & The Man Who Didn&#39;t Take The Bait</em>.</p>
          <p style="font-size:16px;line-height:1.8;color:#e0e0e0;">This is not a true-crime story about Jeffrey Epstein and his island. This book starts at the true beginning &#8212; and what you&#39;re about to read will change everything you thought you knew.</p>
          <div style="text-align:center;margin:30px 0;padding:20px;border:1px solid #C9A84C;border-radius:8px;">
          <p style="color:#C9A84C;font-size:18px;font-weight:bold;margin:0;">Together, we are going to break the Deep State once and for all!</p>
          </div>
          <p style="font-size:14px;color:#888;text-align:center;">&#169; 2026 Jason Sullivan. All rights reserved.</p>
          </div>"""

          # Build plain-text version for donor
          plain_text = (
              "The CIA Asset & The Man Who Didn't Take The Bait\n\n"
              f"Thank you for your generous donation of ${amt:.0f}.\n\n"
              "As promised, attached is your exclusive sneak peek of the first few chapters "
              "of The CIA Asset & The Man Who Didn't Take The Bait.\n\n"
              "This is not a true-crime story about Jeffrey Epstein and his island. "
              "This book starts at the true beginning - and what you're about to read "
              "will change everything you thought you knew.\n\n"
              "Together, we are going to break the Deep State once and for all!\n\n"
              "(c) 2026 Jason Sullivan. All rights reserved."
          )

          # Build Resend API payload for donor
          payload = {
              "from": "The CIA Asset <donations@theciaasset.com>",
              "reply_to": "cyphoon@protonmail.com",
              "to": email,
              "subject": "Your Sneak Peek - The CIA Asset & The Man Who Didn't Take The Bait",
              "html": html,
              "text": plain_text,
              "headers": {
                  "List-Unsubscribe": "<mailto:donations@theciaasset.com?subject=unsubscribe>",
                  "List-Unsubscribe-Post": "List-Unsubscribe=One-Click"
              },
              "attachments": [{
                  "filename": "The-CIA-Asset-Sneak-Peek.pdf",
                  "content": pdf_b64,
                  "type": "application/pdf"
              }]
          }

          # Send email to donor
          resp = requests.post(
              "https://api.resend.com/emails",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              },
              json=payload
          )
          print(f"Donor email - From: donations@theciaasset.com")
          print(f"Donor email - To: {email}")
          print(f"Donor email - Response: {resp.status_code}")
          print(resp.json())

          donor_email_success = resp.status_code == 200
          if donor_email_success:
              print(f"Donor email sent successfully to {email}!")
          else:
              print(f"Donor email send failed!")

          # ========================================
          # DONATION ALERT to Owner
          # ========================================
          # Pacific Time (PDT is UTC-7, PST is UTC-8)
          pacific_offset = timedelta(hours=-7)  # PDT
          pacific_tz = timezone(pacific_offset)
          now = datetime.now(timezone.utc).astimezone(pacific_tz).strftime("%B %d, %Y at %I:%M %p Pacific")
          donation_method = dtype.upper() if dtype else "CARD"
          peek_status = "YES - PDF Sent" if sneak_peek_sent else "NO"

          alert_html = f"""<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;background:#111;color:#e0e0e0;padding:30px;border:1px solid #C9A84C;border-radius:8px;">
          <div style="text-align:center;margin-bottom:20px;border-bottom:2px solid #C9A84C;padding-bottom:15px;">
          <h1 style="color:#C9A84C;font-size:22px;margin:0;">NEW DONATION ALERT</h1>
          <p style="color:#888;font-size:13px;margin:5px 0 0 0;">{now}</p>
          </div>
          <table style="width:100%;border-collapse:collapse;margin:20px 0;">
          <tr style="border-bottom:1px solid #333;">
          <td style="padding:12px 10px;color:#888;font-size:14px;width:40%;">Donor Email</td>
          <td style="padding:12px 10px;color:#fff;font-size:14px;font-weight:bold;"><a href="mailto:{email}" style="color:#C9A84C;text-decoration:none;">{email}</a></td>
          </tr>
          <tr style="border-bottom:1px solid #333;">
          <td style="padding:12px 10px;color:#888;font-size:14px;">Donation Amount</td>
          <td style="padding:12px 10px;color:#4CAF50;font-size:20px;font-weight:bold;">${amt:.2f}</td>
          </tr>
          <tr style="border-bottom:1px solid #333;">
          <td style="padding:12px 10px;color:#888;font-size:14px;">Payment Method</td>
          <td style="padding:12px 10px;color:#fff;font-size:14px;">{donation_method}</td>
          </tr>
          <tr style="border-bottom:1px solid #333;">
          <td style="padding:12px 10px;color:#888;font-size:14px;">Sneak Peek PDF Requested</td>
          <td style="padding:12px 10px;color:{'#4CAF50' if sneak_peek_sent else '#f44336'};font-size:14px;font-weight:bold;">{peek_status}</td>
          </tr>
          <tr>
          <td style="padding:12px 10px;color:#888;font-size:14px;">Donor Email Delivery</td>
          <td style="padding:12px 10px;color:{'#4CAF50' if donor_email_success else '#f44336'};font-size:14px;font-weight:bold;">{"DELIVERED" if donor_email_success else "FAILED"}</td>
          </tr>
          </table>
          <div style="text-align:center;margin-top:20px;padding-top:15px;border-top:1px solid #333;">
          <p style="color:#666;font-size:12px;margin:0;">The CIA Asset - Automated Donation Alert System</p>
          </div>
          </div>"""

          alert_text = (
              "=== NEW DONATION ALERT ===\n"
              f"Date: {now}\n\n"
              f"Donor Email: {email}\n"
              f"Donation Amount: ${amt:.2f}\n"
              f"Payment Method: {donation_method}\n"
              f"Sneak Peek PDF Requested: {peek_status}\n"
              f"Donor Email Delivery: {'DELIVERED' if donor_email_success else 'FAILED'}\n\n"
              "--- The CIA Asset - Automated Donation Alert System ---"
          )

          alert_payload = {
              "from": "The CIA Asset <donations@theciaasset.com>",
              "to": "cyphoon@protonmail.com",
              "subject": f"NEW DONATION: ${amt:.0f} from {email}",
              "html": alert_html,
              "text": alert_text
          }

          alert_resp = requests.post(
              "https://api.resend.com/emails",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              },
              json=alert_payload
          )
          print(f"Alert email - To: cyphoon@protonmail.com")
          print(f"Alert email - Response: {alert_resp.status_code}")
          print(alert_resp.json())

          if alert_resp.status_code == 200:
              print("Owner alert sent successfully!")
          else:
              print("Owner alert failed to send!")

          # Exit based on donor email result
          if not donor_email_success:
              exit(1)
          PYEOF
